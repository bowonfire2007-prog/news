<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<title>Matt's Daily Read</title>
<style>
  :root { --bg:#ffffff; --text:#0a0a0a; --text-muted:#6b6b6b; --text-soft:#9a9a9a; --border:#ececec; --accent:#b8331a; --card-hover:#f5f4f2; }
  [data-theme="dark"] { --bg:#0f0f10; --text:#f5f5f4; --text-muted:#a3a3a3; --text-soft:#6b6b6b; --border:#27272a; --accent:#ff6b4a; --card-hover:#1c1c1f; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; transition:background-color .25s ease,color .25s ease; }
  a { color:inherit; text-decoration:none; }

  /* ── ALERT BANNER ── */
  #alertBanner { width:100%; display:none; flex-direction:column; gap:0; }
  #alertBanner.has-alerts { display:flex; }
  .alert-item { padding:10px 20px; display:flex; align-items:flex-start; gap:10px; font-size:13px; line-height:1.4; color:#fff; }
  .alert-item.extreme  { background:#7f1d1d; }
  .alert-item.severe   { background:#92400e; }
  .alert-item.moderate { background:#1e3a5f; }
  .alert-item.minor    { background:#374151; }
  .alert-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
  .alert-body { flex:1; min-width:0; }
  .alert-event { font-weight:700; letter-spacing:0.02em; }
  .alert-headline { opacity:.9; margin-top:2px; }
  .alert-link { color:#fff; text-decoration:underline; white-space:nowrap; font-weight:600; margin-left:8px; flex-shrink:0; }

  /* ── DRAWER OVERLAY ── */
  .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; opacity:0; pointer-events:none; transition:opacity .25s ease; }
  .drawer-overlay.open { opacity:1; pointer-events:auto; }

  /* ── SIDEBAR DRAWER ── */
  .drawer { position:fixed; top:0; left:0; bottom:0; width:min(300px,85vw); background:var(--bg); border-right:1px solid var(--border); z-index:60; transform:translateX(-100%); transition:transform .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; overflow:hidden; }
  .drawer.open { transform:translateX(0); }
  .drawer-header { padding:20px 20px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
  .drawer-brand { font-family:"Iowan Old Style","Palatino","Georgia",serif; font-size:18px; font-weight:700; letter-spacing:-0.01em; }
  .drawer-brand span { color:var(--accent); }
  .drawer-close { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center; }
  .drawer-close:hover { background:var(--card-hover); color:var(--text); }
  .drawer-list { flex:1; overflow-y:auto; padding:10px 0; }
  .drawer-item { display:flex; align-items:center; gap:12px; padding:12px 20px; cursor:pointer; font-size:15px; font-weight:500; color:var(--text-muted); border-left:3px solid transparent; transition:background .15s,color .15s; }
  .drawer-item:hover { background:var(--card-hover); color:var(--text); }
  .drawer-item.active { color:var(--accent); border-left-color:var(--accent); background:var(--card-hover); font-weight:700; }
  .drawer-item-icon { font-size:18px; width:24px; text-align:center; flex-shrink:0; }

  /* ── HEADER ── */
  header { position:sticky; top:0; z-index:10; background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid var(--border); padding:max(env(safe-area-inset-top),12px) 20px 0; }
  .header-row { max-width:760px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; padding-bottom:12px; }
  .brand { font-family:"Iowan Old Style","Palatino","Georgia",serif; font-size:22px; font-weight:700; letter-spacing:-0.01em; }
  .brand span { color:var(--accent); }
  .header-actions { display:flex; align-items:center; gap:6px; }
  .icon-btn { width:38px; height:38px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:transparent; border:1px solid var(--border); color:var(--text); cursor:pointer; }
  .icon-btn:hover { background:var(--card-hover); }
  .icon-btn svg { width:18px; height:18px; }

  /* ── SECTION BAR ── */
  .section-bar { max-width:760px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:8px 0 10px; }
  .section-label { font-size:13px; font-weight:700; color:var(--text); letter-spacing:0.02em; text-transform:uppercase; }
  .section-menu-btn { font-size:13px; font-weight:600; color:var(--accent); background:transparent; border:none; cursor:pointer; padding:4px 0; display:flex; align-items:center; gap:5px; }
  .section-menu-btn svg { width:14px; height:14px; }

  /* ── WEATHER ── */
  .weather { max-width:760px; margin:0 auto 2px; padding:10px 0; display:flex; flex-direction:column; gap:8px; font-size:14px; }
  .weather.loading { opacity:0.5; }
  .w-current { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .w-temp { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; }
  .w-icon { font-size:22px; }
  .w-cond { color:var(--text); font-weight:500; }
  .w-sep { color:var(--text-soft); }
  .w-meta { color:var(--text-muted); font-size:12px; margin-left:auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .w-meta span { white-space:nowrap; }
  .w-forecast { display:flex; align-items:center; gap:10px; padding-top:6px; border-top:1px solid var(--border); font-size:13px; color:var(--text-muted); flex-wrap:wrap; }
  .w-day { display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .w-day-name { color:var(--text); font-weight:600; }
  .w-radar { margin-left:auto; color:var(--accent); font-weight:600; white-space:nowrap; text-decoration:none; }
  .w-radar:hover { text-decoration:underline; }
  .w-lake { display:inline-flex; align-items:center; gap:5px; padding:3px 10px 3px 8px; background:color-mix(in srgb,var(--accent) 12%,transparent); border-radius:999px; font-weight:700; color:var(--accent); font-size:13px; white-space:nowrap; text-decoration:none; }
  .w-lake:hover { text-decoration:underline; }

  /* ── MAIN ── */
  main { max-width:760px; margin:0 auto; padding:8px 20px max(env(safe-area-inset-bottom),40px); }
  .status { padding:40px 20px; text-align:center; color:var(--text-muted); font-size:14px; line-height:1.6; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── NEWS ITEMS ── */
  article.item { display:flex; gap:16px; padding:20px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  article.item:hover .title { color:var(--accent); }
  .item-text { flex:1; min-width:0; }
  .meta { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-soft); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px; }
  .meta .source { color:var(--text-muted); font-weight:600; }
  .meta .dot { opacity:0.5; }
  .title { font-family:"Iowan Old Style","Palatino","Georgia",serif; font-size:19px; font-weight:700; line-height:1.3; letter-spacing:-0.01em; color:var(--text); display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .desc { margin-top:6px; font-size:14px; color:var(--text-muted); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .thumb { width:110px; height:110px; flex-shrink:0; border-radius:8px; background:var(--card-hover); object-fit:cover; }

  /* ── STOCKS ── */
  .stock-input-row { display:flex; gap:8px; padding:20px 0 12px; border-bottom:1px solid var(--border); }
  .stock-input { flex:1; padding:10px 14px; border-radius:999px; border:1px solid var(--border); background:var(--card-hover); color:var(--text); font-size:14px; outline:none; font-family:inherit; text-transform:uppercase; letter-spacing:0.03em; }
  .stock-input:focus { border-color:var(--accent); }
  .stock-add-btn { padding:0 18px; border-radius:999px; border:none; background:var(--text); color:var(--bg); font-weight:600; font-size:14px; cursor:pointer; }
  .stock-row { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); }
  .stock-main { flex:1; min-width:0; }
  .stock-ticker { font-weight:700; font-size:15px; letter-spacing:0.02em; }
  .stock-name { font-size:12px; color:var(--text-soft); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stock-spark { width:70px; height:30px; flex-shrink:0; opacity:0.9; }
  .stock-price { text-align:right; min-width:92px; }
  .stock-price .price { font-weight:600; font-size:15px; font-variant-numeric:tabular-nums; }
  .stock-price .change { font-size:12px; font-variant-numeric:tabular-nums; margin-top:2px; }
  .up { color:#15803d; } [data-theme="dark"] .up { color:#4ade80; }
  .down { color:#b91c1c; } [data-theme="dark"] .down { color:#f87171; }
  .stock-remove { width:28px; height:28px; border-radius:50%; border:none; background:transparent; color:var(--text-soft); cursor:pointer; font-size:18px; line-height:1; padding:0; flex-shrink:0; }
  .stock-remove:hover { background:var(--card-hover); color:var(--accent); }
  .stock-loading { opacity:0.5; }

  /* ── STOCK NEWS ── */
  .stock-news-header { display:flex; align-items:center; gap:8px; padding:24px 0 4px; border-top:2px solid var(--border); margin-top:8px; }
  .stock-news-title { font-family:"Iowan Old Style","Palatino","Georgia",serif; font-size:18px; font-weight:700; color:var(--text); }
  .stock-news-sub { font-size:12px; color:var(--text-muted); margin-left:auto; }
  .stock-news-loading { padding:20px 0; text-align:center; color:var(--text-muted); font-size:13px; }

  /* ── FOOTER ── */
  footer { max-width:760px; margin:40px auto 0; padding:20px; text-align:center; color:var(--text-soft); font-size:12px; border-top:1px solid var(--border); }
  .retry-btn { margin-top:14px; padding:8px 18px; border-radius:999px; background:var(--accent); color:white; border:none; font-size:14px; font-weight:500; cursor:pointer; }

  /* ── RESPONSIVE ── */
  .w-fishing { display:flex; flex-direction:column; gap:5px; padding-top:8px; border-top:1px solid var(--border); font-size:13px; }
  .w-fish-title { font-weight:700; color:var(--text); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:2px; }
  .w-fish-label { font-weight:600; color:var(--text); margin-right:4px; }
  .w-fish-item { color:var(--text-muted); line-height:1.5; }

  /* ── MO OUTDOORS PANEL ── */
  .od-panel { padding:4px 0 20px; }
  .od-section { margin-bottom:16px; padding:14px 16px; background:color-mix(in srgb,var(--accent) 6%,var(--bg)); border-radius:12px; border:1px solid var(--border); }
  .od-section.od-gold { background:color-mix(in srgb,#f59e0b 13%,var(--bg)); border-color:color-mix(in srgb,#f59e0b 50%,var(--border)); }
  .od-section-title { font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--accent); margin-bottom:10px; }
  .od-row { font-size:13px; color:var(--text-muted); line-height:1.65; margin-bottom:7px; }
  .od-row:last-child { margin-bottom:0; }
  .od-label { font-weight:600; color:var(--text); margin-right:5px; }
  .od-tip { font-size:12px; color:var(--text-soft); margin-top:8px; font-style:italic; }
  .od-tip a, .od-row a { color:var(--accent); text-decoration:none; }
  .od-season { font-weight:600; color:var(--text); }
  .od-news-header { font-weight:700; font-size:15px; color:var(--text); padding:10px 0 16px; border-bottom:2px solid var(--border); margin-top:4px; }
  .od-links { display:flex; flex-wrap:wrap; gap:8px; padding:12px 16px 14px; }
  .od-link { display:inline-block; padding:6px 13px; background:var(--card); border:1px solid var(--border); border-radius:999px; font-size:12px; font-weight:500; color:var(--text); text-decoration:none; }
  .od-mush-grid { display:flex; flex-direction:column; gap:10px; }
  .od-mush { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
  .od-mush.od-gold { background:color-mix(in srgb,#f59e0b 13%,var(--bg)); border-color:color-mix(in srgb,#f59e0b 50%,var(--border)); }
  .od-mush-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .od-mush-season { font-size:11px; color:var(--text-soft); font-weight:500; }
  .od-mush-row { font-size:12px; color:var(--text-muted); line-height:1.55; margin-bottom:3px; }
  .od-mush-row:last-child { margin-bottom:0; }
    @media (max-width:520px) {
    .brand { font-size:20px; }
    .title { font-size:17px; }
    .thumb { width:84px; height:84px; }
    article.item { padding:16px 0; gap:12px; }
    main, .header-row, header, .weather, .section-bar { padding-left:16px; padding-right:16px; }
    .weather, .section-bar { padding-left:0; padding-right:0; }
    .w-temp { font-size:20px; }
    .w-meta { font-size:11px; gap:6px; }
  }

  /* ── TLDR BUTTON ── */
  .tldr-btn { display:inline-flex; align-items:center; gap:5px; margin-top:8px; padding:4px 10px; border-radius:999px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:11px; font-weight:600; letter-spacing:0.04em; cursor:pointer; font-family:inherit; text-transform:uppercase; transition:background .15s, color .15s, border-color .15s; }
  .tldr-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tldr-btn.loading { opacity:0.6; pointer-events:none; }
  /* ── TLDR MODAL ── */
  #tldrModal { position:fixed; inset:0; z-index:200; display:flex; align-items:flex-end; justify-content:center; pointer-events:none; }
  #tldrModal.open { pointer-events:auto; }
  #tldrBackdrop { position:absolute; inset:0; background:rgba(0,0,0,.5); opacity:0; transition:opacity .25s; }
  #tldrModal.open #tldrBackdrop { opacity:1; }
  #tldrSheet { position:relative; width:100%; max-width:700px; background:var(--bg); border-radius:20px 20px 0 0; border-top:1px solid var(--border); padding:24px 24px max(env(safe-area-inset-bottom),24px); transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); max-height:80vh; overflow-y:auto; }
  #tldrModal.open #tldrSheet { transform:translateY(0); }
  #tldrClose { position:absolute; top:14px; right:16px; width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  #tldrClose:hover { background:var(--card-hover); }
  #tldrLabel { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); margin-bottom:8px; }
  #tldrHeadline { font-family:"Iowan Old Style","Palatino","Georgia",serif; font-size:18px; font-weight:700; line-height:1.35; color:var(--text); margin-bottom:14px; }
  #tldrBody { font-size:15px; color:var(--text-muted); line-height:1.7; white-space:pre-wrap; }
  #tldrSource { margin-top:14px; font-size:12px; color:var(--text-soft); }
  #tldrSource a { color:var(--accent); font-weight:600; }

</style>
</head>
<body>

<!-- NWS ALERT BANNER -->
<div id="alertBanner"></div>

<!-- TLDR MODAL -->
<div id="tldrModal">
  <div id="tldrBackdrop"></div>
  <div id="tldrSheet">
    <button id="tldrClose" aria-label="Close">×</button>
    <div id="tldrLabel">AI Summary</div>
    <div id="tldrHeadline"></div>
    <div id="tldrBody"><span class="spinner"></span> Summarizing…</div>
    <div id="tldrSource"></div>
  </div>
</div>

<!-- DRAWER OVERLAY -->
<div id="drawerOverlay" class="drawer-overlay"></div>

<!-- SIDEBAR DRAWER -->
<nav id="drawer" class="drawer" aria-label="Navigation">
  <div class="drawer-header">
    <div class="drawer-brand">Matt's Daily<span>.</span>Read</div>
    <button id="drawerClose" class="drawer-close" aria-label="Close menu">×</button>
  </div>
  <div id="drawerList" class="drawer-list"></div>
</nav>

<header>
  <div class="header-row">
    <button class="icon-btn" id="menuBtn" aria-label="Open navigation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="brand">Matt's Daily<span>.</span>Read</div>
    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
      <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
  </div>
  <div class="weather loading" id="weather"><span class="spinner"></span><span>Loading weather…</span></div>
  <div class="section-bar">
    <span class="section-label" id="sectionLabel">Top Stories</span>
    <button class="section-menu-btn" id="sectionMenuBtn">
      All Sections
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
  </div>
</header>

<main>
  <div id="status" class="status"><span class="spinner"></span>Loading…</div>
  <div id="list"></div>
</main>

<script>

    { source:"Reuters (via Google)", url:"https://news.google.com/rss/search?q=when:1d+site:reuters.com&hl=en-US&gl=US&ceid=US:en" },
    { source:"Washington Post", url:"https://feeds.washingtonpost.com/rss/world" },
    { source:"ABC News", url:"https://abcnews.go.com/abcnews/topstories" },
    { source:"DW (Germany)", url:"https://rss.dw.com/rdf/rss-en-all" }

// ========== UTILS ==========
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}
function stripHtml(html) {
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return (div.textContent || div.innerText || "").replace(/\s+/g, " ").trim();
}
function extractImg(html) {
  if (!html) return "";
  const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
  return m ? m[1] : "";
}
function relativeTime(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60) + "m ago";
  if (diff < 86400) return Math.floor(diff/3600) + "h ago";
  if (diff < 604800) return Math.floor(diff/86400) + "d ago";
  return new Date(ts).toLocaleDateString(undefined, { month:"short", day:"numeric" });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

// ========== NWS ALERTS ==========
async function fetchNWSAlerts() {
  const cacheKey = "news.nws.alerts";
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const p = JSON.parse(cached);
      if (Date.now() - p.ts < ALERTS_CACHE_TTL_MS) { renderAlerts(p.data); return; }
    }
  } catch {}
  try {
    const res = await fetchWithTimeout(
      "https://api.weather.gov/alerts/active?point=" + WEATHER_LOCATION.lat + "," + WEATHER_LOCATION.lon,
      6000
    );
    if (!res.ok) throw new Error("NWS HTTP " + res.status);
    const data = await res.json();
    const alerts = (data.features || []).map(f => ({
      event: f.properties.event || "",
      headline: f.properties.headline || f.properties.description || "",
      severity: (f.properties.severity || "").toLowerCase(),
      url: f.properties["@id"] || ""
    }));
    try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data: alerts })); } catch {}
    renderAlerts(alerts);
  } catch (e) {
    console.warn("NWS alerts failed:", e);
  }
}
function severityClass(sev) {
  if (sev === "extreme") return "extreme";
  if (sev === "severe") return "severe";
  if (sev === "moderate") return "moderate";
  return "minor";
}
function severityIcon(sev) {
  if (sev === "extreme" || sev === "severe") return "🚨";
  if (sev === "moderate") return "⚠️";
  return "ℹ️";
}
function renderAlerts(alerts) {
  if (!alerts || alerts.length === 0) {
    alertBannerEl.classList.remove("has-alerts");
    alertBannerEl.innerHTML = "";
    return;
  }
  alertBannerEl.classList.add("has-alerts");
  alertBannerEl.innerHTML = alerts.map(a =>
    '<div class="alert-item ' + severityClass(a.severity) + '">' +
      '<span class="alert-icon">' + severityIcon(a.severity) + '</span>' +
      '<div class="alert-body">' +
        '<div class="alert-event">' + escapeHtml(a.event) + ' — Clinton, MO</div>' +
        '<div class="alert-headline">' + escapeHtml((a.headline || "").slice(0, 180)) + '</div>' +
      '</div>' +
      (a.url ? '<a class="alert-link" href="' + escapeHtml(a.url) + '" target="_blank" rel="noopener">Details →</a>' : '') +
    '</div>'
  ).join("");
}

const TRUMAN_NORMAL_POOL_FT = 706.0; // Normal pool elevation, ft above sea level (NAVD88)
async function fetchTrumanLake() {
  try {
    // USGS site 06922440 = Harry S. Truman Dam and Res. at Warsaw, MO
    // parameterCd 00065 = Gage height (pool elevation), feet — period=P1D gives 24h of readings
    const res = await fetchWithTimeout(
      "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=06922440&parameterCd=00065&siteStatus=active&period=P1D",
      6000
    );
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const series = data && data.value && data.value.timeSeries && data.value.timeSeries[0];
    if (!series) throw new Error("no series");
    const vals = series.values && series.values[0] && series.values[0].value;
    if (!vals || !vals.length) throw new Error("no values");
    const last  = vals[vals.length - 1];
    const first = vals[0];
    const stage = parseFloat(last.value);
    if (!isFinite(stage)) throw new Error("bad stage");
    const change24h = isFinite(parseFloat(first.value)) ? stage - parseFloat(first.value) : null;
    return { stage, time: last.dateTime, change24h };

function parseXmlFeed(xmlText, source) {
  const doc = new DOMParser().parseFromString(xmlText, "application/xml");
  if (doc.querySelector("parsererror")) return [];
  const isAtom = doc.documentElement.nodeName.toLowerCase() === "feed";
  const entries = Array.from(doc.querySelectorAll(isAtom ? "entry" : "item"));
  return entries.slice(0, PER_FEED_LIMIT).map(el => {
    const get = sel => { const n = el.querySelector(sel); return n ? n.textContent.trim() : ""; };
    let link = "";
    if (isAtom) {
      const a = el.querySelector("link[rel='alternate']") || el.querySelector("link");
      link = a ? (a.getAttribute("href") || a.textContent.trim()) : "";
    } else { link = get("link"); }
    const title = get("title");
    const desc = get("description") || get("summary") || get("content");
    const pubStr = get("pubDate") || get("published") || get("updated");
    const enclosure = el.querySelector("enclosure[url]");
    let thumb = enclosure ? enclosure.getAttribute("url") : extractImg(desc);
    return {
      title, link,
      description: stripHtml(desc).slice(0, 240),
      pubDate: pubStr ? new Date(pubStr).getTime() : Date.now(),
      thumbnail: thumb || "",
      source
    };
  }).filter(x => x.title && x.link);
}
async function fetchViaProxy(proxy, feed) {
  const res = await fetchWithTimeout(proxy.url(feed.url), FEED_TIMEOUT_MS);
  if (!res.ok) throw new Error(proxy.name + " HTTP " + res.status);
  if (proxy.parse === "json") {
    const data = await res.json();
    if (data.status !== "ok" || !Array.isArray(data.items)) throw new Error("bad rss2json");
    return data.items.slice(0, PER_FEED_LIMIT).map(it => ({
      title: (it.title || "").trim(),
      link: it.link,
      description: stripHtml(it.description || it.content || "").slice(0, 240),
      pubDate: it.pubDate ? new Date(it.pubDate).getTime() : Date.now(),
      thumbnail: it.thumbnail || (it.enclosure && it.enclosure.link) || extractImg(it.content || it.description) || "",
      source: feed.source
    })).filter(x => x.title && x.link);
  }
  if (proxy.parse === "allorigins") {
    const data = await res.json();
    if (!data.contents) throw new Error("empty allorigins");
    return parseXmlFeed(data.contents, feed.source);
  }
  throw new Error("unknown parse mode");
}
async function fetchFeed(feed) {
  const cacheKey = "news.cache." + feed.url;
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    try { const p = JSON.parse(cached); if (Date.now() - p.ts < CACHE_TTL_MS) return p.items; } catch {}
  }
  for (const proxy of PROXIES) {
    try {
      const items = await fetchViaProxy(proxy, feed);
      if (items.length) {
        try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), items })); } catch {}
        return items;
      }
    } catch (err) {
      console.warn("[" + feed.source + "] " + proxy.name + " failed:", (err && err.message) || err);
    }
  }
  return [];
}

async function fetchTextThroughProxies(targetUrl) {
  let lastErr;
  for (const proxy of CORS_PROXIES) {
    try {
      const res = await fetchWithTimeout(proxy.url(targetUrl), FEED_TIMEOUT_MS);
      if (!res.ok) { lastErr = new Error(proxy.name + " HTTP " + res.status); continue; }
      const text = await res.text();
      if (!text || text.length < 10) { lastErr = new Error(proxy.name + " empty"); continue; }
      return text;
    } catch (err) {
      lastErr = err;
      console.warn("Stock proxy " + proxy.name + " failed:", (err && err.message) || err);
    }
  }
  throw lastErr || new Error("all stock proxies failed");
}
async function fetchQuoteYahoo(ticker) {
  const yahooUrl = "https://query1.finance.yahoo.com/v8/finance/chart/" + encodeURIComponent(ticker) + "?interval=1d&range=1mo";
  const text = await fetchTextThroughProxies(yahooUrl);
  const data = JSON.parse(text);
  const result = data && data.chart && data.chart.result && data.chart.result[0];
  if (!result) throw new Error("no chart data");
  const meta = result.meta || {};
  const closesRaw = (result.indicators && result.indicators.quote && result.indicators.quote[0] && result.indicators.quote[0].close) || [];
  const closes = closesRaw.filter(x => x !== null && x !== undefined);
  const price = (meta.regularMarketPrice !== undefined && meta.regularMarketPrice !== null) ? meta.regularMarketPrice : closes[closes.length - 1];
  // Use closes[last] as prevClose — avoids chartPreviousClose bug where Yahoo returns
  // start-of-period close (not yesterday's close) causing fake +30-40% swings on volatile stocks
  const prevClose = closes.length >= 2 ? closes[closes.length - 2] : (meta.previousClose || meta.chartPreviousClose || closes[closes.length - 1]);
  const change = price - prevClose;
  return {
    ticker, name: meta.shortName || meta.longName || ticker,
    price, change,
    changePct: (change / prevClose) * 100,
    currency: meta.currency || "USD",
    closes: closes.slice(-30),
    source: "Yahoo"
  };
}
async function fetchQuoteStooq(ticker) {
  const sym = ticker.toLowerCase() + (ticker.indexOf(".") === -1 ? ".us" : "");
  const histUrl = "https://stooq.com/q/d/l/?s=" + encodeURIComponent(sym) + "&i=d";
  const csv = await fetchTextThroughProxies(histUrl);
  if (!csv || csv.indexOf("Date") === -1) throw new Error("no stooq data");
  const lines = csv.trim().split(/\r?\n/);
  const rows = lines.slice(1).map(l => l.split(",")).filter(r => r.length >= 5);
  if (rows.length < 2) throw new Error("not enough rows");
  const recent = rows.slice(-30);
  const closes = recent.map(r => parseFloat(r[4])).filter(x => !isNaN(x));
  if (closes.length < 2) throw new Error("bad closes");
  const price = closes[closes.length - 1];
  const prevClose = closes[closes.length - 2];
  const change = price - prevClose;
  return {
    ticker, name: ticker,
    price, change,
    changePct: (change / prevClose) * 100,
    currency: "USD", closes, source: "Stooq"
  };
}

function sparklineSvg(closes) {
  if (!closes || closes.length < 2) return '<div class="stock-spark"></div>';
  const w = 70, h = 30, pad = 2;
  const min = Math.min.apply(null, closes);
  const max = Math.max.apply(null, closes);
  const range = max - min || 1;
  const points = closes.map((c, i) => {
    const x = pad + (i / (closes.length - 1)) * (w - 2 * pad);
    const y = h - pad - ((c - min) / range) * (h - 2 * pad);
    return x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
  const up = closes[closes.length - 1] >= closes[0];
  const color = up ? "#22c55e" : "#ef4444";
  return '<svg class="stock-spark" viewBox="0 0 ' + w + ' ' + h + '" xmlns="http://www.w3.org/2000/svg"><polyline fill="none" stroke="' + color + '" stroke-width="1.5" points="' + points + '"/></svg>';
}
function fmtMoney(n, currency) {
  if (n === null || n === undefined || !isFinite(n)) return "—";
  const sym = currency === "USD" ? "$" : "";
  return sym + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtChange(abs, pct) {
  if (abs === null || abs === undefined || !isFinite(abs)) return "—";
  const sign = abs >= 0 ? "+" : "";
  return sign + abs.toFixed(2) + " (" + sign + pct.toFixed(2) + "%)";
}

async function loadCategory(force) {
  var _odc = document.getElementById("od-container"); if (_odc) _odc.remove();
  if (activeCat === "pulse") { loadPulse(); return; }
  if (activeCat === "outdoors") { loadOutdoors(); return; }
  const cat = CATEGORIES.find(c => c.id === activeCat);
  if (cat.isStocks) return loadStocks(force);
  listEl.innerHTML = "";
  statusEl.style.display = "block";
  let done = 0;
  const total = cat.feeds.length;
  const updateStatus = () => {
    statusEl.innerHTML = '<span class="spinner"></span>Loading ' + cat.label.toLowerCase() + ' &nbsp;<span style="opacity:.6">(' + done + '/' + total + ' sources)</span>';
  };
  updateStatus();
  if (force) cat.feeds.forEach(f => localStorage.removeItem("news.cache." + f.url));
  const results = await Promise.all(cat.feeds.map(async f => {
    const items = await fetchFeed(f);
    done++;
    updateStatus();
    return { source: f.source, items };
  }));
  const all = results.flatMap(r => r.items).sort((a, b) => b.pubDate - a.pubDate);

  // Deduplicate
  const seen = new Set();
  const deduped = all.filter(item => {
    const key = item.title.toLowerCase().slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  if (deduped.length === 0) {
    statusEl.innerHTML = "Couldn't load any stories. The RSS proxies may be slow or down.<br><span style=\"opacity:.6\">Tried: " + cat.feeds.map(f => f.source).join(", ") + "</span><br><button class=\"retry-btn\" onclick=\"loadCategory(true)\">Try again</button>";
    return;
  }
  statusEl.style.display = "none";
  renderNews(deduped);
}
window.loadCategory = loadCategory;

function renderNews(items) {
  const frag = document.createDocumentFragment();
  items.forEach(item => {
    const wrapper = document.createElement("div");
    wrapper.style.cssText = "border-bottom:1px solid var(--border);";
    const a = document.createElement("a");
    a.className = "item";
    a.href = item.link;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.setAttribute("role","article");
    a.style.borderBottom = "none";
    const hasImg = item.thumbnail && /^https?:\/\//.test(item.thumbnail);
    a.innerHTML =
      '<div class="item-text">' +
        '<div class="meta"><span class="source">' + escapeHtml(item.source) + '</span><span class="dot">·</span><span>' + relativeTime(item.pubDate) + '</span></div>' +
        '<div class="title">' + escapeHtml(item.title) + '</div>' +
        (item.description ? '<div class="desc">' + escapeHtml(item.description) + '</div>' : '') +
      '</div>' +
      (hasImg ? '<img class="thumb" src="' + escapeHtml(item.thumbnail) + '" alt="" loading="lazy" onerror="this.remove()">' : '');
    const tldrRow = document.createElement("div");
    tldrRow.style.cssText = "padding:0 0 12px;";
    const btn = document.createElement("button");
    btn.className = "tldr-btn";
    btn.textContent = "✦ AI Summary";
    btn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); openTldr(item.title, item.link); });
    tldrRow.appendChild(btn);
    wrapper.appendChild(a);
    wrapper.appendChild(tldrRow);
    frag.appendChild(wrapper);
  });
  listEl.innerHTML = "";
  listEl.appendChild(frag);
}

function getClaudeKey() {

  if (!k) {

async function openTldr(title, url) {
  tldrHeadline.textContent = title;
  tldrBody.innerHTML = '<span class="spinner"></span> Fetching article…';
  tldrSource.innerHTML = '<a href="' + url + '" target="_blank" rel="noopener noreferrer">View original article ↗</a>';
  tldrModal.classList.add("open");
  document.body.style.overflow = "hidden";
  try {
    const jinaUrl = "https://r.jina.ai/" + encodeURIComponent(url);
    const jinaRes = await fetch(jinaUrl, { headers: { "Accept": "text/plain", "X-Return-Format": "text" } });
    if (!jinaRes.ok) throw new Error("Jina fetch failed: " + jinaRes.status);
    const articleText = (await jinaRes.text()).slice(0, 6000);
    tldrBody.innerHTML = '<span class="spinner"></span> Summarizing with AI…';
    const apiKey = getClaudeKey();
    if (!apiKey) { tldrBody.textContent = "No API key set. Reload and enter your Anthropic key to use AI summaries."; return; }
    const claudeRes = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": getClaudeKey(),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 400,
        messages: [{
          role: "user",
          content: "Please summarize this article in 3-5 clear bullet points. Be concise and focus on the key facts.\n\nTitle: " + title + "\n\nContent:\n" + articleText
        }]
      })
    });
    if (!claudeRes.ok) throw new Error("Claude API error: " + claudeRes.status);
    const claudeData = await claudeRes.json();
    const summary = claudeData.content[0].text;
    tldrBody.textContent = summary;
  } catch (err) {
    tldrBody.textContent = "Could not generate summary: " + err.message;
  }
}
window.openTldr = openTldr;

    else if (month === 8 && day >= 20) upcoming.push("\U0001f54a️ Dove opens Sept 1 — " + (32 - day) + " days away");
    if (month === 10 || (month === 11 && day <= 14)) active.push("\U0001f98c Archery Deer Season (Oct 1 – Nov 14)");
    else if (month === 9 && day >= 15) upcoming.push("\U0001f98c Archery deer opens Oct 1 — hang your stand now");
    if (month === 12 || (month === 1 && day <= 15)) active.push("\U0001f98c Late Archery/Muzzleloader (Dec 1 – Jan 15)");
    if (month === 11 && day >= 15 && day <= 25) active.push("\U0001f98c\U0001f52b FIREARMS DEER SEASON OPEN (Nov 15–25) — prime time!");
    else if (month === 11 && day >= 1 && day < 15) upcoming.push("\U0001f98c\U0001f52b Firearms deer opens Nov 15 — " + (15 - day) + " days away!");
    else if (month === 10 && day >= 20) upcoming.push("\U0001f98c Firearms deer season Nov 15 — scout your stand locations now");
    if ((month === 4 && day >= 18) || (month === 5 && day <= 10)) active.push("\U0001f983 Spring Turkey Season (late Apr – May 10)");
    else if (month === 4 && day < 18) upcoming.push("\U0001f983 Spring turkey opens ~April 18 — " + (18 - day) + " days. Scout strutting areas.");
    else if (month === 3 && day >= 15) upcoming.push("\U0001f983 Spring turkey ~3–4 weeks away. Practice your calls.");
    if (month === 11 || month === 12 || (month === 1 && day <= 31)) active.push("\U0001f986 Waterfowl Season open (check MDC for exact zone dates)");
    else if (month === 10 && day >= 20) upcoming.push("\U0001f986 Duck/goose opens Nov 1 — scout flooded fields now");
    if ((month === 5 && day >= 25) || month >= 6 || month <= 2) active.push("\U0001f43f️ Squirrel Season (May 25 – Feb 15)");
    if (month === 10 || month === 11 || month === 12 || month <= 2) active.push("\U0001f430 Rabbit Season (Oct 1 – Feb 15)");
    if (month >= 6 && month <= 10) active.push("\U0001f3a3 Fishing: no closed season for most MO species. Trout parks have special regs.");
    return { active: active, upcoming: upcoming };
  }

  /* ── PLANTING ── */
  function plantingGuide(month, day) {
    var tips = [];
    if (month <= 2 || (month === 3 && day <= 10)) {
      tips.push("\U0001f331 Start onion and leek seeds indoors (Jan–Feb). Order bare-root trees, strawberry plants, asparagus crowns before they sell out.");
      tips.push("\U0001f333 Dormant-prune fruit trees, grapes, and roses through early March before bud break.");
      tips.push("\U0001f98c Deer food plot planning: order clover, chicory, brassica seed now for spring planting.");
    }
    if (month === 3) {
      tips.push("\U0001f331 Start tomatoes and peppers indoors (6–8 weeks before last frost ~May 1–10 in central MO).");
      tips.push("\U0001f333 Best time for bare-root trees: oaks, pecans, persimmons, pawpaws, serviceberry, elderberry. Plant before they leaf out.");
      tips.push("\U0001f33e Cool-season crops outdoors: peas, spinach, lettuce, onion sets, radishes (handle light frost).");
      tips.push("\U0001f98c Spring food plots: frost-seed clover into existing grass in late March (freeze/thaw works it in).");
    }
    if (month === 4 && day <= 20) {
      tips.push("\U0001f331 Harden off tomato/pepper transplants outdoors daily. Plant potatoes now.");
      tips.push("\U0001f333 Plant native shrubs: serviceberry, elderberry, wild plum, hawthorn — great for wildlife and table. Native plants go in fast this time of year.");
    }
    if (month === 4 && day > 20) tips.push("\U0001f331 After April 20: warm-season transplants safe in sheltered spots. Watch the 10-day forecast for late frost.");
    if (month === 5) {
      tips.push("\U0001f331 After May 10–15: transplant tomatoes, peppers, squash, cucumbers, melons outdoors in central MO.");
      tips.push("\U0001f98c Clover and chicory food plots: plant after May 15. Needs moisture to establish — watch the rain forecast.");
      tips.push("\U0001f33c Native wildflowers: butterfly milkweed, purple coneflower, black-eyed Susan. Attract pollinators and hummingbirds. Direct sow or transplant now.");
    }
    if (month === 6) {
      tips.push("\U0001f331 Full garden underway. Direct-sow beans, squash, melons, okra, sweet potatoes.");
      tips.push("\U0001f98c Summer annual food plots: cowpeas, sunflowers, sorghum-sudan grass for late summer and fall wildlife.");
      tips.push("\U0001f333 Avoid transplanting trees in summer heat. Water established plantings deeply once a week.");
    }
    if (month === 7 || month === 8) {
      tips.push("\U0001f331 Start fall garden indoors: broccoli, cabbage, kale (start late July, transplant mid-August).");
      if (month === 8) tips.push("\U0001f98c <strong>Plant fall food plots NOW</strong>: turnips, radishes, rape, kale by Aug 1–15. This timing is critical for full establishment before deer season.");
      tips.push("\U0001f333 Late summer tree planting OK with heavy watering. Fall planting 6 weeks away — plan your mast tree additions.");
    }
    if (month === 9) {
      tips.push("\U0001f331 Plant spinach, kale, arugula now for fall harvest. Garlic goes in mid-October.");
      tips.push("\U0001f333 <strong>Best tree-planting season</strong> — warm soil, cooling air, fall rains. Plant oaks, pecans, persimmons, pawpaws, dogwood, redbud. They’ll establish all fall and winter.");
      tips.push("\U0001f98c Perennial food plots: clover, chicory, cereal rye. Mid-September target for central MO.");
    }
    if (month === 10) {
      tips.push("\U0001f333 Fall tree planting prime time. Oaks, hickories, persimmons, chestnuts for long-term mast production.");
      tips.push("\U0001f331 Plant garlic cloves 4–6 inches deep, cover with 3–4 inches mulch. Harvest next July.");
      tips.push("\U0001f98c Last chance for cereal rye and winter wheat food plots — should be in the ground by mid-October in central MO.");
    }
    if (month === 11 || month === 12) {
      tips.push("\U0001f333 Dormant-season tree planting OK on mild days above 32°F. Bare-root orders arrive Dec–Feb — order now for best variety selection.");
      tips.push("\U0001f331 Plan next year’s garden and food plots. Popular seed varieties sell out by February.");
    }
    return tips;
  }

  /* ── BUILD PANEL HTML ── */
  var wildlife  = wildlifeActivity(mo, dy);
  var mushHtml  = mushroomGuide(mo, dy);
  var birds     = birdMigration(mo, dy);
  var seasons   = huntingSeasons(mo, dy);
  var plants    = plantingGuide(mo, dy);

  var H = '<div class="od-panel">';

  /* Shad / Cast Net */
  H += '<div class="od-section">'
    + '<div class="od-section-title">\U0001fa63 Cast Net — Shad Report</div>'
    + '<div id="od-shad-wind" class="od-row"><span class="od-label">\U0001f4cd Best Bank</span>'
    + shadWindHtml(null, 0) + '</div>'
    + '<div class="od-row"><span class="od-label">\U0001f4c5 Spawn Status</span>'
    + shadSpawnHtml(mo, dy) + '</div>'
    + '</div>';

  /* Fishing Conditions */
  H += '<div class="od-section">'
    + '<div class="od-section-title">\U0001f3a3 Truman Lake Fishing Conditions</div>'
    + '<div id="od-fish-body"><div class="od-row" style="color:var(--text-soft);font-style:italic;">⏳ Fetching lake data…</div></div>'
    + '</div>';

  /* Wildlife */
  if (wildlife.length) {
    H += '<div class="od-section">'
      + '<div class="od-section-title">\U0001f43e Wildlife Activity &amp; Nature Now</div>'
      + wildlife.map(function(w) { return '<div class="od-row">' + w + '</div>'; }).join("")
      + '</div>';
  }

  /* Mushrooms */
  H += '<div class="od-section">'
    + '<div class="od-section-title">\U0001f344 Missouri Edible Mushrooms — Field Guide</div>'
    + '<div class="od-mush-grid">' + mushHtml + '</div>'
    + '<div class="od-tip">Always use multiple field guides. When in doubt, throw it out. Slice all puffballs to verify pure-white inside. <a href="https://momushroomhunters.com/" target="_blank" rel="noopener">MO Mushroom Hunters Club →</a></div>'
    + '</div>';

  /* Birds */
  if (birds.length) {
    H += '<div class="od-section">'
      + '<div class="od-section-title">\U0001f426 Bird Migration &amp; Feeders</div>'
      + birds.map(function(b) { return '<div class="od-row">' + b + '</div>'; }).join("")
      + '</div>';
  }

  /* Seasons */
  if (seasons.active.length || seasons.upcoming.length) {
    H += '<div class="od-section">'
      + '<div class="od-section-title">\U0001f98c Hunting &amp; Fishing Seasons</div>'
      + seasons.active.map(function(s) { return '<div class="od-row od-season">✅ ' + s + '</div>'; }).join("")
      + seasons.upcoming.map(function(s) { return '<div class="od-row">⏳ ' + s + '</div>'; }).join("")
      + '<div class="od-tip"><a href="https://huntfish.mdc.mo.gov/hunting-trapping/regulations" target="_blank" rel="noopener">\U0001f4cb MDC Official Regulations →</a></div>'
      + '</div>';
  }

  /* Planting */
  if (plants.length) {
    H += '<div class="od-section">'
      + '<div class="od-section-title">\U0001f331 ' + mname + ' Planting Guide</div>'
      + plants.map(function(p) { return '<div class="od-row">' + p + '</div>'; }).join("")
      + '<div class="od-tip"><a href="https://extension.missouri.edu/programs/agebb" target="_blank" rel="noopener">\U0001f4da MU Extension →</a></div>'
      + '</div>';
  }

  /* Quick Links */
  H += '<div class="od-links">'
    + '<a href="https://huntfish.mdc.mo.gov/" target="_blank" rel="noopener" class="od-link">\U0001f3e0 MDC HuntFish</a>'
    + '<a href="https://mdc.mo.gov/fishing/fishing-reports" target="_blank" rel="noopener" class="od-link">\U0001f3a3 MDC Fishing Reports</a>'
    + '<a href="https://waterdata.usgs.gov/monitoring-location/06922440/" target="_blank" rel="noopener" class="od-link">\U0001f30a Truman Lake Level</a>'
    + '<a href="https://www.purplemartin.org/scout-arrival-study/" target="_blank" rel="noopener" class="od-link">\U0001f426 Martin Scout Map</a>'
    + '<a href="https://www.hummingbirdcentral.com/hummingbird-migration-spring-missouri.htm" target="_blank" rel="noopener" class="od-link">\U0001f33a Hummingbird Map</a>'
    + '<a href="https://huntfish.mdc.mo.gov/hunting-trapping/regulations" target="_blank" rel="noopener" class="od-link">\U0001f4cb MDC Regs</a>'
    + '<a href="https://extension.missouri.edu/publications" target="_blank" rel="noopener" class="od-link">\U0001f4da MU Extension</a>'
    + '<a href="https://momushroomhunters.com/" target="_blank" rel="noopener" class="od-link">\U0001f344 MO Mushroom Hunters</a>'
    + '</div>';

  H += '<div class="od-news-header">\U0001f4f0 Latest Missouri Outdoors News</div>';
  H += '</div>';
  odc.innerHTML = H;

  /* ── Fetch live lake + weather data ── */
  var wxUrl = "https://api.open-meteo.com/v1/forecast?latitude=" + WEATHER_LOCATION.lat
    + "&longitude=" + WEATHER_LOCATION.lon
    + "&current=temperature_2m,wind_speed_10m,wind_direction_10m"
    + "&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto";

  Promise.all([
    fetchTrumanLake(),
    fetch(wxUrl).then(function(r) { return r.json(); }).catch(function() { return null; })
  ]).then(function(res) {
    var lake = res[0];
    var wx   = res[1];
    var airTempF = wx && wx.current ? Math.round(wx.current.temperature_2m) : null;
    var windMph  = wx && wx.current ? Math.round(wx.current.wind_speed_10m)  : 0;
    var windDeg  = wx && wx.current ? Math.round(wx.current.wind_direction_10m) : null;

    /* Update shad wind bank */
    var shadEl = document.getElementById("od-shad-wind");
    if (shadEl) shadEl.innerHTML = '<span class="od-label">\U0001f4cd Best Bank</span>' + shadWindHtml(windDeg, windMph);

    /* Update fishing conditions */
    var fishEl = document.getElementById("od-fish-body");
    if (!fishEl) return;
    if (!lake || !isFinite(lake.stage)) {
      fishEl.innerHTML = '<div class="od-row" style="color:var(--text-soft);font-style:italic;">Lake data unavailable. <a href="https://waterdata.usgs.gov/monitoring-location/06922440/" target="_blank" rel="noopener">Check USGS →</a></div>';
      return;
    }
    var diff = lake.stage - TRUMAN_NORMAL_POOL_FT;
    var ch = lake.change24h;
    var rising  = ch !== null && ch > 0.05;
    var falling = ch !== null && ch < -0.05;
    var fastMov = ch !== null && Math.abs(ch) > 0.5;
    var stageStr = lake.stage.toFixed(1) + " ft";
    var diffStr  = (diff >= 0 ? "+" : "") + diff.toFixed(1) + " ft";
    var trendStr = rising ? " ↑" : falling ? " ↓" : " →";

    /* Shad wind (already done above) */
    var shadNote = shadWindHtml(windDeg, windMph);

    /* Blue cat */
    var blueCat = diff > 5 && rising  ? (fastMov ? "Fast-rising flood pool — blues scattered in flooded timber and creek arms 2–8 ft. Fresh-cut bait near flooded brush edges." : "High rising pool — blues pushed into flooded timber and creek arms. Chunk shad near wood edges.")
                : diff > 5 && falling ? "High falling lake — blues moving back to main channel ledges and creek mouths. Target 15–25 ft drops with cut shad."
                : diff > 5            ? "High stable pool — blues spread through timber and channel bends. Drift cut shad along 10–20 ft structure."
                : diff > 1 && rising  ? "Rising water activating blues. Hit creek channel bends and flooded timber edges with skipjack or cut shad."
                : diff > 1 && falling ? "Slight drop — blues staging on main lake ledges and deeper humps. Try 20–30 ft channel bend drops."
                : diff < -2 && falling? "Low falling lake — blues stacking in deepest holes. Tailwater below the dam can be excellent. Night bite peaks."
                :                       "Stable pool — target main lake ledges, submerged timber, and creek channel bends in 15–30 ft.";
    if (windMph >= 15) blueCat += " Wind-swept main lake points are bonus ambush spots.";

    /* Crappie */
    var crappie = diff > 3 && rising            ? "Rising water pushing crappie into flooded brush 2–8 ft. Work jigs slow through the timber — they’ll be tight to wood."
                : airTempF !== null && airTempF >= 75 ? "Warm temps — spawn or post-spawn. Fish shallow brush, dock pilings, stumps 2–6 ft. Jigs and minnows both produce."
                : airTempF !== null && airTempF >= 62 ? "Pre-spawn crappie moving shallow. Hit brush piles 5–12 ft and dock pockets — morning bite is prime."
                : airTempF !== null && airTempF >= 50 ? "Transitioning shallower. Fish brush and timber edges in 10–18 ft with slow jig presentations."
                :                                       "Crappie holding deep. Slow-fish brush piles and submerged timber in 15–25 ft.";

    var tempStr = airTempF !== null ? airTempF + "°F air" : "";
    fishEl.innerHTML = '<div class="od-row" style="font-size:12px;color:var(--text-soft);margin-bottom:8px;">Truman Lake: <strong>' + stageStr + '</strong> (' + diffStr + trendStr + ') &nbsp;···&nbsp; ' + tempStr + '</div>'
      + '<div class="od-row"><span class="od-label">\U0001f436 Blue Catfish</span>' + blueCat + '</div>'
      + '<div class="od-row"><span class="od-label">\U0001f41f Crappie</span>' + crappie + '</div>'
      + '<div class="od-row"><span class="od-label">\U0001fa63 Shad/Wind</span>' + shadNote + '</div>';
  });

  /* ── Load news feeds into #list ── */
  statusEl.style.display = "block";
  statusEl.innerHTML = '<span class="spinner"></span>Loading Missouri outdoors news…';
  var cat = CATEGORIES.find(function(c) { return c.id === "outdoors"; });
  var done2 = 0, total2 = cat.feeds.length;
  Promise.all(cat.feeds.map(function(f) {
    return fetchFeed(f).then(function(items) {
      done2++;
      statusEl.innerHTML = '<span class="spinner"></span>Loading outdoors news… (' + done2 + '/' + total2 + ')';
      return { source: f.source, items: items };
    });
  })).then(function(res) {
    var all2 = res.reduce(function(acc, r) { return acc.concat(r.items); }, []).sort(function(a, b) { return b.pubDate - a.pubDate; });
    var seen2 = new Set();
    var deduped2 = all2.filter(function(item) {
      var key = item.title.toLowerCase().slice(0, 60);
      if (seen2.has(key)) return false;
      seen2.add(key);
      return true;
    });
    statusEl.style.display = "none";
    if (deduped2.length > 0) renderNews(deduped2);
    else statusEl.innerHTML = "No outdoors news found right now. Try again in a minute.";
  });
}
window.loadOutdoors = loadOutdoors;

// ========== INIT ==========
document.getElementById("refreshBtn").addEventListener("click", () => {
  localStorage.removeItem("news.nws.alerts");
  fetchNWSAlerts();
  loadWeather(true);
  loadCategory(true);
});

// Pull-to-refresh
let startY = 0, pulling = false;
document.addEventListener("touchstart", e => { if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; } }, { passive: true });
document.addEventListener("touchend", e => {
  if (!pulling) return;
  const dy = e.changedTouches[0].clientY - startY;
  if (dy > 80) { fetchNWSAlerts(); loadWeather(true); loadCategory(true); }
  pulling = false;
});

// Keyboard: Escape closes drawer
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

renderDrawer();
updateSectionLabel();
fetchNWSAlerts();
loadWeather();
loadCategory();
</script>
</body>
</html>
